services:
  relay:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8090"
      DATA_DIR: "/data"
      REGION_ID: "local"
      NETWORK_ID: "mainnet"
      SHARD_ID: "shard-0"
      SHARD_SET: "shard-0"
      BACKEND_KIND: "local"
      STATE_KIND: "valkey"
      VALKEY_URL: "redis://valkey:6379"
      BROKER_KIND: "nats"
      BROKER_URL: "nats://nats:4222"
      BROKER_BUFFER: "256"
      BROKER_TOPIC: "mevrelay.v3.events"
      CHECKPOINT_KIND: "minio"
      CHECKPOINT_ENDPOINT: "minio:9000"
      CHECKPOINT_ACCESS_KEY: "minioadmin"
      CHECKPOINT_SECRET_KEY: "minioadmin"
      CHECKPOINT_BUCKET: "mevrelay-checkpoints"
      CHECKPOINT_USE_SSL: "false"
      OTEL_SERVICE_NAME: "mevrelayv3"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_SAMPLE_RATIO: "0.25"
    volumes:
      - relay-data:/data
    ports:
      - "8090:8090"
    depends_on:
      - otel-collector
      - jaeger
      - nats
      - valkey
      - minio

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "yes", "--dir", "/data"]
    volumes:
      - valkey-data:/data
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.103.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: "minioadmin"
      MINIO_ROOT_PASSWORD: "minioadmin"
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - relay

volumes:
  relay-data:
  valkey-data:
  minio-data:
