services:
  orchestrator:
    build:
      context: ../../solana/orchestrator/scala
    depends_on:
      - postgres
      - valkey
      - redpanda

  compute:
    build:
      context: ../../solana/compute/rust

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: decision_store
      POSTGRES_USER: decision
      POSTGRES_PASSWORD: decision
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../storage/postgres/init:/docker-entrypoint-initdb.d

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
      - ../cache/valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
      - ../audit/redpanda/redpanda.yaml:/etc/redpanda/redpanda.yaml

volumes:
  postgres-data:
  valkey-data:
  redpanda-data:
