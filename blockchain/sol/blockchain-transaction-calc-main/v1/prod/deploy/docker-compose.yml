services:
  orchestrator:
    build:
      context: ../..
      dockerfile: solana/orchestrator/scala/Dockerfile
    restart: unless-stopped
    environment:
      COMPUTE_HOST: compute
      COMPUTE_PORT: "50051"
      POSTGRES_URL: jdbc:postgresql://postgres:5432/decision_store
      POSTGRES_USER: decision
      POSTGRES_PASSWORD: decision
      VALKEY_URI: redis://valkey:6379/0
      AUDIT_BOOTSTRAP_SERVERS: redpanda:9092
      AUDIT_TOPIC: solana.audit
    depends_on:
      - compute
      - postgres
      - valkey
      - redpanda

  compute:
    build:
      context: ../..
      dockerfile: solana/compute/rust/Dockerfile
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      COMPUTE_ADDR: 0.0.0.0:50051

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: decision_store
      POSTGRES_USER: decision
      POSTGRES_PASSWORD: decision
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../storage/postgres/init:/docker-entrypoint-initdb.d

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
      - ../cache/valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf

  redpanda:
    image: redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
      - ../audit/redpanda/redpanda.yaml:/etc/redpanda/redpanda.yaml

volumes:
  postgres-data:
  valkey-data:
  redpanda-data:
