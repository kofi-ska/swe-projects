services:
  app:
    build:
      context: .
    image: ${WORKFLOW_ENGINE_IMAGE:-workflow-engine:local}
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      DATA_DIR: /data
      DATABASE_URL: postgres://${POSTGRES_USER:-workflow}:${POSTGRES_PASSWORD:-workflow}@postgres:5432/${POSTGRES_DB:-workflow}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-1048576}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-64}
      MAX_REQUESTS_PER_MINUTE: ${MAX_REQUESTS_PER_MINUTE:-120}
      V3_API_KEY: ${V3_API_KEY:?V3_API_KEY is required}
      REQUIRE_V3_API_KEY: ${REQUIRE_V3_API_KEY:-true}
      ENABLE_V1_HTTP: ${ENABLE_V1_HTTP:-false}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-workflow-engine-v3}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      OTEL_TRACES_ENABLED: ${OTEL_TRACES_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - workflow-data:/data

  edge:
    image: caddy:2.8-alpine
    depends_on:
      - app
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./compose/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-workflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./compose/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workflow} -d ${POSTGRES_DB:-workflow}"]
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./compose/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "6379:6379"

volumes:
  pgdata:
  workflow-data:
  caddy_data:
  caddy_config:
