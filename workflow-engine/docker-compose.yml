services:
  app:
    build:
      context: .
    image: ${WORKFLOW_ENGINE_IMAGE:-workflow-engine:local}
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      DATA_DIR: /data
      DATABASE_URL: postgres://${POSTGRES_USER:-workflow}:${POSTGRES_PASSWORD:-workflow}@postgres:5432/${POSTGRES_DB:-workflow}
      MAX_BODY_BYTES: ${MAX_BODY_BYTES:-1048576}
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      jaeger:
        condition: service_started
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - workflow-data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-workflow}
      POSTGRES_USER: ${POSTGRES_USER:-workflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-workflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./compose/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workflow} -d ${POSTGRES_DB:-workflow}"]
      interval: 5s
      timeout: 3s
      retries: 20

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./compose/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "6379:6379"

volumes:
  pgdata:
  workflow-data:
